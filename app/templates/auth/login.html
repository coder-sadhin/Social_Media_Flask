{% extends "index.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

        <!-- Title -->
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">
            Welcome Back 👋
        </h2>
        <p class="text-center text-gray-500 mb-6 text-sm">
            Login to your account
        </p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-red-100 text-red-600 p-2 rounded mb-4 text-sm">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" class="space-y-4">

            <!-- Email -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">Password</label>

                <div class="relative">
                    <input 
                        type="password" 
                        name="password" 
                        id="password"
                        required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >

                    <!-- Toggle button -->
                    <span onclick="togglePassword()" 
                        class="absolute right-3 top-2 cursor-pointer text-gray-500">
                        👁️
                    </span>
                </div>
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" class="accent-blue-500">
                    <span>Remember me</span>
                </label>

                <a href="{{ url_for('auth.forgot_password') }}" 
                   class="text-blue-500 hover:underline">
                    Forgot password?
                </a>
            </div>

            <!-- Button -->
            <button 
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition duration-200"
            >
                Login
            </button>

        </form>

        <!-- Divider -->
        <div class="my-6 flex items-center">
            <div class="flex-1 h-px bg-gray-300"></div>
            <span class="px-3 text-gray-400 text-sm">OR</span>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>

        <!-- Register Link -->
        <p class="text-center text-sm text-gray-600">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" 
               class="text-blue-500 hover:underline font-medium">
                Register
            </a>
        </p>

    </div>
    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</div>
{% endblock %}

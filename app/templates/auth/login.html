{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex flex-col justify-center items-center px-4">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)] w-full max-w-[440px] border border-gray-100">
        
        <div class="text-center mb-10">
            <div class="mx-auto w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-200">
                <i class="fas fa-bolt text-white text-3xl"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Welcome back</h1>
            <p class="text-gray-500 text-sm">Please enter your details to sign in.</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 ml-1">Email Address</label>
                <div class="relative group">
                    <input type="email" name="email" placeholder="name@company.com" required
                        class="w-full p-3.5 pl-4 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition-colors">
                        Forgot password?
                    </a>
                </div>
                <div class="relative group">
                    <input type="password" name="password" id="login-password" placeholder="••••••••" required
                        class="w-full p-3.5 pl-4 pr-12 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                    <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-base hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98]">
                Sign in
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-100"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-400 uppercase tracking-widest text-[10px] font-bold">Or continue with</span>
            </div>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-500">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">
                    Create for free
                </a>
            </p>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}

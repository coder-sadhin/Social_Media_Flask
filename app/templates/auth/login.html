{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row items-center justify-center min-h-[80vh] container mx-auto px-4">
    
    <div class="md:w-1/2 text-center md:text-left mb-8 md:mb-0 md:pr-10">
        <h1 class="text-blue-600 text-6xl font-bold mb-4">socialmedia</h1>
        <p class="text-2xl text-gray-700 leading-tight">
            Connect with friends and the world around you on SocialMedia.
        </p>
    </div>

    <div class="md:w-1/3 w-full">
        <div class="bg-white p-6 rounded-lg shadow-xl border border-gray-200">
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-4">
                    <input type="email" name="email" placeholder="Email address" required
                        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 text-lg bg-gray-50">
                </div>
                <div class="mb-4">
                    <input type="password" name="password" placeholder="Password" required
                        class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 text-lg bg-gray-50">
                </div>
                <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-md text-xl hover:bg-blue-700 transition duration-200 shadow-md">
                    Log In
                </button>
            </form>

            <div class="text-center mt-4 border-b pb-6">
                <a href="{{ url_for('auth.forgot_password') }}" class="text-blue-500 hover:underline text-sm">Forgotten password?</a>
            </div>

            <div class="text-center pt-6">
                <a href="{{ url_for('auth.register') }}" 
                    class="bg-green-500 text-white font-bold py-3 px-4 rounded-md text-lg hover:bg-green-600 transition duration-200 inline-block shadow-md">
                    Create new account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

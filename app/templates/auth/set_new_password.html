{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex flex-col justify-center items-center px-4">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)] w-full max-w-[440px] border border-gray-100">
        
        <div class="text-center mb-10">
            <div class="mx-auto w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center border border-blue-100 mb-6 text-blue-600 rotate-3 hover:rotate-0 transition-transform duration-300">
                <i class="fas fa-fingerprint text-3xl"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Set new password</h1>
            <p class="text-gray-500 text-sm">Your new password must be different from previously used passwords.</p>
        </div>

        <form action="{{ url_for('auth.set_new_password') }}" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 ml-1">New Password</label>
                <div class="relative group">
                    <input type="password" name="password" id="password" placeholder="••••••••" required minlength="8"
                        class="w-full p-3.5 pl-4 pr-12 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                    <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <div class="flex gap-1 px-1 pt-1">
                    <div id="str-1" class="h-1 w-full rounded-full bg-gray-200 transition-colors"></div>
                    <div id="str-2" class="h-1 w-full rounded-full bg-gray-200 transition-colors"></div>
                    <div id="str-3" class="h-1 w-full rounded-full bg-gray-200 transition-colors"></div>
                    <div id="str-4" class="h-1 w-full rounded-full bg-gray-200 transition-colors"></div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 ml-1">Confirm New Password</label>
                <div class="relative group">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required minlength="8"
                        class="w-full p-3.5 pl-4 pr-12 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                    <button type="button" onclick="togglePassword('confirm_password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-base hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98] mt-2">
                Reset password
            </button>
        </form>

        <div class="text-center mt-10">
            <a href="{{ url_for('auth.login') }}" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-blue-600 transition-colors group">
                <i class="fas fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> 
                Back to log in
            </a>
        </div>
    </div>
</div>

<script>
    // Show/Hide Password Toggle
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // Simple visual feedback for password strength
    const pwdInput = document.getElementById('password');
    pwdInput.addEventListener('input', function() {
        const val = pwdInput.value;
        const bars = [document.getElementById('str-1'), document.getElementById('str-2'), document.getElementById('str-3'), document.getElementById('str-4')];
        
        // Reset colors
        bars.forEach(b => b.className = 'h-1 w-full rounded-full bg-gray-200 transition-colors');
        
        if(val.length > 0) bars[0].classList.add('bg-red-400');
        if(val.length > 5) bars[1].classList.add('bg-orange-400');
        if(val.length > 8) bars[2].classList.add('bg-yellow-400');
        if(val.length > 10 && /[A-Z]/.test(val)) bars[3].classList.add('bg-green-500');
    });
</script>
{% endblock %}

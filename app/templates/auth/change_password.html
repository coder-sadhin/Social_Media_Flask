{% extends "index.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
        
        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Change Password 🔒
        </h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-red-100 text-red-600 p-2 rounded mb-4 text-sm">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" class="space-y-4">

            <!-- Current Password -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Current Password
                </label>
                <input 
                    type="password" 
                    name="current_password" 
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-200 focus:scale-[1.01]"
                >
            </div>

            <!-- New Password -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    New Password
                </label>
                <input 
                    type="password" 
                    name="new_password" 
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-200 focus:scale-[1.01]"
                >
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Confirm New Password
                </label>
                <input 
                    type="password" 
                    name="confirm_password" 
                    required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-200 focus:scale-[1.01]"
                >
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition duration-200"
            >
                Update Password
            </button>

        </form>

    </div>
</div>
{% endblock %}

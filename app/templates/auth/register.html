{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="min-h-screen w-full flex flex-col justify-center items-center px-4 py-12">
    
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)] w-full max-w-[480px] border border-gray-100 mt-[-5vh]">
        
        <div class="text-center mb-6">
            <div class="mx-auto w-16 h-16 bg-green-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-green-200">
                <i class="fas fa-user-plus text-white text-2xl"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Create an account</h1>
            <p class="text-gray-500 text-sm">Join the community and start connecting today.</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-2">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1 space-y-1.5">
                    <label class="text-xs font-bold text-gray-700 ml-1">Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required
                        class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                </div>
                <div class="flex-1 space-y-1.5">
                    <label class="text-xs font-bold text-gray-700 ml-1">Nickname</label>
                    <input type="text" name="nickname" placeholder="Johnny"
                        class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 ml-1">Username</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">@</span>
                    <input type="text" name="username" placeholder="johndoe123" required
                        class="w-full p-2 pl-8 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 ml-1">Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required
                    class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 ml-1">Password</label>
                <div class="relative group">
                    <input type="password" name="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8"
                        class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all duration-200">
                    <button type="button" onclick="togglePassword('reg-password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 transition-colors">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <p class="text-[11px] text-gray-400 text-center p-2 leading-relaxed">
                By clicking Sign Up, you agree to our 
                <a href="#" class="text-blue-600 font-bold hover:underline">Terms of Service</a> 
                and <a href="#" class="text-blue-600 font-bold hover:underline">Privacy Policy</a>.
            </p>

            <button type="submit" 
                class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-base hover:bg-green-700 transition-all shadow-lg shadow-green-500/20 active:scale-[0.98]">
                Get started for free
            </button>
        </form>

        <div class="text-center mt-4 pt-4 border-t border-gray-50">
            <p class="text-sm text-gray-500">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Log In</a>
            </p>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}

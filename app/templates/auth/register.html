<form method="POST" class="max-w-md mx-auto mt-10 space-y-4">
    <input name="name" placeholder="Name" class="w-full p-2 border">
    <input name="username" placeholder="Username" class="w-full p-2 border">
    <input name="email" placeholder="Email" class="w-full p-2 border">
    <input name="password" type="password" placeholder="Password" class="w-full p-2 border">
    <button class="bg-blue-500 text-white px-4 py-2">Register</button>
</form>

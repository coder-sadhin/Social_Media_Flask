{% extends "base.html" %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh] p-4">
    <div class="bg-white p-6 md:p-8 rounded-lg shadow-xl w-full max-w-[430px] border border-gray-200">
        <div class="mb-4 border-b pb-4">
            <h2 class="text-2xl font-bold">Sign Up</h2>
            <p class="text-gray-600 text-sm">Join the community today.</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-4">
            <div class="flex gap-3">
                <input type="text" name="name" placeholder="Full Name" required
                    class="w-1/2 p-2.5 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">
                <input type="text" name="nickname" placeholder="Nickname"
                    class="w-1/2 p-2.5 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>

            <input type="text" name="username" placeholder="Username" required
                class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">

            <input type="email" name="email" placeholder="Email address" required
                class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">

            <input type="password" name="password" placeholder="New password" required
                class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">

            <p class="text-[11px] text-gray-500">
                By clicking Sign Up, you agree to our Terms and Data Policy.
            </p>

            <div class="text-center">
                <button type="submit" 
                    class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-16 rounded-md text-lg transition duration-200 shadow-md">
                    Sign Up
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
